<!doctype html>
<!--
  Twitch Clips Player — single static file, zero dependencies.

  SETUP (one time, fully first-party):
    1. Register an app at https://dev.twitch.tv/console
         OAuth Redirect URL: http://localhost
         Category: Application Integration
       → copy the CLIENT ID.
    2. Get a user token — paste this in your browser (replace CLIENT_ID):
         https://id.twitch.tv/oauth2/authorize?client_id=CLIENT_ID&redirect_uri=http://localhost&response_type=token&scope=chat:read
       Twitch redirects to http://localhost/#access_token=XXXX (page fails to load — fine,
       the token is in the address bar). Copy the access_token value.
    3. OBS → Browser Source → Local file → pick this clips.html
       (or URL: file:///C:/path/to/clips.html?channel=YOURCHANNEL&clientId=...&token=...)
       Size: 1920x1080. Check "Shutdown source when not visible".
       No web server needed — clip mp4 URLs are resolved via Twitch GQL.

  PARAMS — see sourcebuilder.html for a UI to generate the URL.
    channel=a,b,c        (required) one or more channels
    clientId=...         (required) Twitch app client id matching the token
    token=...            (required) user OAuth access token
    limit=20             clips per channel (Helix cap 100; pass any number, we paginate)
    sort=recent|top      shuffle when recent (default), most-viewed first when top
    dateRange=7          last N days only
    featured=true        prefer featured clips, fallback to all when empty
    game=Just+Chatting   filter to one game (by name)
    minViews=100         skip clips with fewer than N views
    minDuration=10       skip clips shorter than N seconds
    maxDuration=60       skip clips longer than N seconds
    exclude=word1,word2  skip clips whose title contains any of these (case-insensitive)
    include=word1,word2  ONLY play clips whose title contains one of these
    noRepeat=true        remember played clip ids in localStorage, never replay
    loop=N               stop after playing N clips (default: infinite)
    gap=1500             milliseconds of blackness between clips (default 0)
    volume=0.8           audio volume 0–1 (default 1)
    fit=cover|contain    video fit mode (default cover; contain keeps full clip visible)
    pos=top|bottom       overlay position (default bottom)
    showInfo=false       hide overlay
    template={channel} - {title}     replaces ALL three lines with one (vars: see below)
    chTemplate=...       custom .ch line (default: {channel})
    tiTemplate=...       custom .ti line (default: {title})
    meTemplate=...       custom .me line (default: {views} views · clipped by {creator_name} · {date})
       Variables: {channel} {title} {game} {creator_name} {created_at} {date} {views} {views_raw} {duration}
    command=!clipsreel   chat command to start; "!cmd stop" stops
    modsOnly=true        restrict command + control to mods/broadcaster
    chatControl=true     enable !clipskip/!clippause/!clipplay/!clipreload
    transition=fade|slide-left|slide-right|slide-up|slide-down|zoom|cut    between-clip effect
    transitionMs=500     transition duration (default 500)
    transitionVideo=URL  custom video file (mp4/webm) played as transition between clips
    debug=true           show on-screen log overlay (helix calls, gql, video errors)
    showupdates=true     show a banner when a newer GitHub release is available

  STYLING — point OBS "Custom CSS" at these hooks:
    video       the player    | #info       overlay container
    .ch  .ti  .me              channel / title / meta lines
    #bar        progress bar   | body        background, fonts
  Example: hide channel + meta, keep big title:
    .ch,.me{display:none} .ti{font-size:32px}
-->
<html><head><meta charset=utf-8><title>Clips</title><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;height:100%;overflow:hidden;font:14px system-ui,sans-serif;color:#fff;display:grid;place-items:center}
/* ponytail: 16:9 letterboxed stage = same logical canvas as cssbuilder preview, no cropping at any viewport aspect */
#stage{position:relative;aspect-ratio:16/9;width:min(100vw,calc(100vh*16/9));height:auto;max-height:100vh;background:#000;overflow:hidden}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#000}
#info{position:absolute;bottom:0;left:0;right:0;padding:14px 20px 18px;z-index:3;
  background:linear-gradient(transparent,rgba(0,0,0,.78));pointer-events:none;
  text-shadow:0 1px 3px rgba(0,0,0,.6)}
#info.hide,#info:empty{display:none}
.ch{font-size:13px;opacity:.75;letter-spacing:.3px}
.ti{font-size:17px;font-weight:600;margin-top:3px;line-height:1.25}
.me{font-size:12px;opacity:.6;margin-top:4px}
#bar{position:absolute;bottom:0;left:0;height:3px;background:#9147ff;width:0;z-index:3}
#msg{position:fixed;inset:0;display:none;place-items:center;text-align:center;padding:30px;
  color:#f88;font-size:15px;line-height:1.5;white-space:pre-wrap}
#msg.show{display:grid}
#setup{font-size:14px;color:#ddd;max-width:640px;line-height:1.6;text-align:left}
#setup h2{color:#9147ff;margin-bottom:14px}
#setup a{color:#9147ff}
#setup code{background:#222;padding:2px 6px;border-radius:3px;font-size:13px}
#dbg{position:fixed;top:0;left:0;right:0;max-height:50vh;overflow:auto;
  background:rgba(0,0,0,.85);color:#0f0;font:11px/1.4 ui-monospace,monospace;
  padding:6px 10px;display:none;z-index:99;white-space:pre-wrap;word-break:break-all}
#dbg.show{display:block}
#dbg .err{color:#f66}#dbg .ok{color:#6f6}#dbg .info{color:#9cf}
</style></head>
<body>
<div id=stage>
  <video id=v autoplay playsinline></video>
  <div id=info></div>
  <div id=bar></div>
</div>
<div id=msg></div>
<div id=dbg></div>
<script>
const P = new URLSearchParams(location.search);
const get = (k, d='') => P.get(k) ?? d;
const $ = id => document.getElementById(id);
const v = $('v'), bar = $('bar'), info = $('info'), msg = $('msg');

const list = k => get(k).split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
const CHANNELS   = get('channel').split(',').map(s=>s.trim()).filter(Boolean);
const CLIENT_ID  = get('clientId');
const TOKEN      = get('token');
const LIMIT      = +get('limit','20')||20;
const SORT       = get('sort','recent');
const DAYS       = +get('dateRange')||0;
const FEATURED   = get('featured')==='true';
const GAME       = get('game').toLowerCase();
const MIN_VIEWS  = +get('minViews')||0;
const MIN_DUR    = +get('minDuration')||0;
const MAX_DUR    = +get('maxDuration')||0;
const EXCLUDE    = list('exclude');
const INCLUDE    = list('include');
const NO_REPEAT  = get('noRepeat')==='true';
const LOOP       = +get('loop')||0;
const GAP        = +get('gap')||0;
const VOLUME     = Math.max(0, Math.min(1, +get('volume','1')));
const FIT        = get('fit','cover');
const POS        = get('pos','bottom');
const SHOW_INFO  = get('showInfo')!=='false';
const TEMPLATE   = get('template','');
const CH_TPL     = get('chTemplate','');
const TI_TPL     = get('tiTemplate','');
const ME_TPL     = get('meTemplate','');
const COMMAND    = get('command').toLowerCase();
const MODS_ONLY  = get('modsOnly','true')!=='false';
const CHAT_CTRL  = get('chatControl','true')!=='false';
const DEBUG      = get('debug')==='true';
const TRANSITION    = get('transition','');           // '' = no transition (cut)
const TRANSITION_MS = +get('transitionMs','500')||500;
const TRANSITION_VID= get('transitionVideo','');

if (!SHOW_INFO) info.classList.add('hide');
v.style.objectFit = FIT;

// ── Dual-video stage: front plays, back preloads next, swap for crossfade ─
// ponytail: two <video> elements is the minimum for a true two-sided transition (old out + new in)
const v2 = v.cloneNode(false);
v2.id = 'v2';
v2.style.objectFit = FIT;
v.parentNode.insertBefore(v2, v.nextSibling);
let front = v, back = v2;

// ── CSS injected from cssbuilder.html via postMessage (cross-origin safe) ─
const builderStyle = document.createElement('style');
builderStyle.id = 'builder-injected';
document.head.appendChild(builderStyle);
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'cssbuilder' && typeof e.data.css === 'string') {
    builderStyle.textContent = e.data.css;
  }
});

// ── Transitions ──────────────────────────────────────────────────────────
// ponytail: CSS keyframes injected once. Custom video transition = separate <video> overlaid.
const TRANSITION_KF = {
  fade:         '@keyframes clipEnter{from{opacity:0}to{opacity:1}}@keyframes clipExit{from{opacity:1}to{opacity:0}}',
  'slide-left': '@keyframes clipEnter{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:none}}@keyframes clipExit{from{transform:none}to{opacity:0;transform:translateX(-100%)}}',
  'slide-right':'@keyframes clipEnter{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:none}}@keyframes clipExit{from{transform:none}to{opacity:0;transform:translateX(100%)}}',
  'slide-up':   '@keyframes clipEnter{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}@keyframes clipExit{from{transform:none}to{opacity:0;transform:translateY(-100%)}}',
  'slide-down': '@keyframes clipEnter{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:none}}@keyframes clipExit{from{transform:none}to{opacity:0;transform:translateY(100%)}}',
  zoom:         '@keyframes clipEnter{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}@keyframes clipExit{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.15)}}',
};
if (TRANSITION && TRANSITION_KF[TRANSITION] !== undefined) {
  const s = document.createElement('style');
  s.textContent = TRANSITION_KF[TRANSITION]
    + `\n.clip-enter{animation:clipEnter ${TRANSITION_MS}ms ease-out forwards}`
    + `\n.clip-exit{animation:clipExit ${TRANSITION_MS}ms ease-out forwards}`;
  document.head.appendChild(s);
}
async function playTransitionVideo() {
  return new Promise(res => {
    const tv = document.createElement('video');
    tv.src = TRANSITION_VID;
    tv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;z-index:5;background:#000;object-fit:cover';
    tv.autoplay = true; tv.playsInline = true;
    tv.volume = VOLUME; tv.muted = VOLUME === 0;
    $('stage').appendChild(tv);
    const done = () => { tv.remove(); res(); };
    tv.addEventListener('ended', done);
    tv.addEventListener('error', () => { log('err', 'transition video failed:', TRANSITION_VID); done(); });
    tv.play().catch(() => { tv.muted = true; tv.play().catch(done); });
  });
}
if (POS === 'top') { info.style.top = '0'; info.style.bottom = 'auto';
  info.style.background = 'linear-gradient(rgba(0,0,0,.78), transparent)'; }

const PLAYED_KEY = 'clipsPlayer_seen';
const seen = NO_REPEAT ? new Set(JSON.parse(localStorage.getItem(PLAYED_KEY) || '[]')) : null;
const markSeen = id => { if (!seen) return; seen.add(id); localStorage.setItem(PLAYED_KEY, JSON.stringify([...seen].slice(-5000))); };
let playedCount = 0;

// ── Debug overlay ───────────────────────────────────────────────────────
const dbg = $('dbg');
if (DEBUG) dbg.classList.add('show');
function log(kind, ...args) {
  const text = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
  console.log('[' + kind + ']', ...args);
  if (!DEBUG) return;
  const line = document.createElement('div');
  line.className = kind;
  line.textContent = new Date().toLocaleTimeString() + ' [' + kind + '] ' + text;
  dbg.appendChild(line);
  while (dbg.children.length > 40) dbg.removeChild(dbg.firstChild);
  dbg.scrollTop = dbg.scrollHeight;
}
window.addEventListener('error', e => log('err', 'window:', e.message));
window.addEventListener('unhandledrejection', e => log('err', 'promise:', e.reason?.message || e.reason));

function showText(text) { msg.textContent = text; msg.classList.add('show'); }
function showSetup() {
  msg.classList.add('show');
  msg.textContent = '';
  const d = document.createElement('div'); d.id = 'setup';
  d.innerHTML = `<h2></h2>
    Missing <code>channel</code>, <code>clientId</code>, or <code>token</code>.<br><br>
    <b>Step 1.</b> Register an app at
      <a href="https://dev.twitch.tv/console/apps/create" target=_blank>dev.twitch.tv/console</a>.
      Set <b>OAuth Redirect URL</b> = <code>http://localhost</code>, <b>Type</b> = <b>Public</b>. Copy the Client ID.<br><br>
    <b>Step 2.</b> Paste your Client ID:
      <input id=cid placeholder="Client ID" style="width:100%;padding:6px;margin:6px 0;background:#222;border:1px solid #444;color:#fff;font-family:monospace"><br>
      Then click → <a id=authlink target=_blank style="pointer-events:none;opacity:.5">Authorize on Twitch</a><br>
      Twitch redirects to <code>http://localhost/#access_token=XXXX</code> (page fails to load — fine,
      the token is in the address bar). Copy the <code>access_token</code> value.<br><br>
    <b>Step 3.</b> Open this file with:
      <code>?channel=YOURCHANNEL&amp;clientId=...&amp;token=...</code>`;
  d.querySelector('h2').textContent = 'Twitch Clips Player — Setup';
  msg.appendChild(d);
  const cid = d.querySelector('#cid'), link = d.querySelector('#authlink');
  cid.addEventListener('input', () => {
    const id = cid.value.trim();
    if (id) {
      link.href = `https://id.twitch.tv/oauth2/authorize?client_id=${encodeURIComponent(id)}&redirect_uri=http://localhost&response_type=token&scope=chat:read`;
      link.style.pointerEvents = 'auto'; link.style.opacity = '1';
    } else {
      link.removeAttribute('href');
      link.style.pointerEvents = 'none'; link.style.opacity = '.5';
    }
  });
}

if (!CHANNELS.length || !CLIENT_ID || !TOKEN) { showSetup(); throw new Error('config'); }

// ── Helix ────────────────────────────────────────────────────────────────
const HDRS = {'Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + TOKEN};
const helix = async path => {
  const safePath = path.split('?')[0];
  log('info', 'helix →', safePath);
  const r = await fetch('https://api.twitch.tv/helix/' + path, {headers: HDRS});
  if (!r.ok) { log('err', 'helix', r.status, safePath); throw new Error(`Helix ${r.status} on ${safePath}`); }
  return r.json();
};

const userCache = {};
async function userId(login) {
  if (userCache[login]) return userCache[login];
  const u = await helix(`users?login=${encodeURIComponent(login)}`);
  return userCache[login] = u.data[0]?.id || null;
}

async function fetchClips(ch, featured) {
  const id = await userId(ch);
  if (!id) { console.warn('no such channel', ch); return []; }
  let base = `broadcaster_id=${id}&first=100`;
  if (DAYS > 0) {
    const end = new Date(), start = new Date(Date.now() - DAYS*86400000);
    base += `&started_at=${start.toISOString().split('.')[0]}Z&ended_at=${end.toISOString().split('.')[0]}Z`;
  }
  if (featured) base += '&is_featured=true';
  // ponytail: paginate to reach LIMIT — Helix cap is 100 per request, cursor for more
  const want = Math.max(1, LIMIT), out = []; let cursor = '';
  while (out.length < want) {
    const q = base + (cursor ? `&after=${cursor}` : '');
    const r = await helix('clips?' + q);
    const got = r.data || [];
    if (!got.length) break;
    got.forEach(x => x._channel = ch);
    out.push(...got);
    cursor = r.pagination?.cursor;
    if (!cursor) break;
  }
  return out.slice(0, want);
}

async function loadAll() {
  let all = [];
  for (const ch of CHANNELS) {
    try {
      let c = await fetchClips(ch, FEATURED);
      // ponytail: fallback when featured+daterange yields nothing — ported from teklynk
      if (!c.length && (FEATURED || DAYS)) c = await fetchClips(ch, false);
      all = all.concat(c);
    } catch (e) { console.warn(ch, e.message); }
  }
  // resolve game names (single batched call when possible)
  const gameIds = [...new Set(all.map(c=>c.game_id).filter(Boolean))];
  if (gameIds.length) {
    const games = {};
    try {
      const r = await helix('games?' + gameIds.slice(0,100).map(id=>'id='+id).join('&'));
      (r.data||[]).forEach(g => games[g.id] = g.name);
    } catch {}
    all.forEach(c => c._game = games[c.game_id] || '');
  }
  // filters
  if (GAME)         all = all.filter(c => (c._game||'').toLowerCase() === GAME);
  if (MIN_VIEWS)    all = all.filter(c => c.view_count >= MIN_VIEWS);
  if (MIN_DUR)      all = all.filter(c => (c.duration||0) >= MIN_DUR);
  if (MAX_DUR)      all = all.filter(c => (c.duration||0) <= MAX_DUR);
  if (EXCLUDE.length) all = all.filter(c => { const t=(c.title||'').toLowerCase(); return !EXCLUDE.some(w => t.includes(w)); });
  if (INCLUDE.length) all = all.filter(c => { const t=(c.title||'').toLowerCase(); return INCLUDE.some(w => t.includes(w)); });
  if (seen)         all = all.filter(c => !seen.has(c.id));
  if (SORT === 'top') all.sort((a,b) => b.view_count - a.view_count);
  else                shuffle(all);
  return all;
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} }

// ── GQL: resolve real mp4 URL for a clip slug ───────────────────────────
// ponytail: full query body instead of persisted-query hash — Twitch rotates hashes,
// but inline queries keep working. Uses Twitch's public web-player Client-ID.
const GQL_CLIP_QUERY = `query($slug:ID!){clip(slug:$slug){playbackAccessToken(params:{platform:"web",playerBackend:"mediaplayer",playerType:"site"}){signature value} videoQualities{sourceURL frameRate quality}}}`;
async function resolveMp4(slug) {
  const r = await fetch('https://gql.twitch.tv/gql', {
    method: 'POST',
    headers: {'Client-ID': 'kimne78kx3ncx6brgo4mv6wki5h1ko', 'Content-Type': 'application/json'},
    body: JSON.stringify({query: GQL_CLIP_QUERY, variables: {slug}})
  });
  if (!r.ok) { log('err', 'gql', r.status); throw new Error('gql ' + r.status); }
  const j = await r.json();
  const q = j?.data?.clip?.videoQualities;
  const tok = j?.data?.clip?.playbackAccessToken;
  if (!q?.length || !tok) { log('err', 'gql empty for', slug, j?.errors); throw new Error('no playback'); }
  q.sort((a,b) => b.bitrate - a.bitrate);
  log('ok', 'gql', slug, q[0].quality + 'p', q[0].bitrate);
  return `${q[0].sourceURL}?sig=${tok.signature}&token=${encodeURIComponent(tok.value)}`;
}

// ── Player ───────────────────────────────────────────────────────────────
const fmtN = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n;
const expand = (tpl, c) => tpl
  .replaceAll('{channel}',     c.broadcaster_name || c._channel)
  .replaceAll('{title}',       c.title || '')
  .replaceAll('{game}',        c._game || '')
  .replaceAll('{creator_name}',c.creator_name || '')
  .replaceAll('{created_at}',  new Date(c.created_at).toLocaleDateString())
  .replaceAll('{date}',        new Date(c.created_at).toLocaleDateString())
  .replaceAll('{views}',       fmtN(c.view_count || 0))
  .replaceAll('{views_raw}',   String(c.view_count || 0))
  .replaceAll('{duration}',    String(Math.round(c.duration || 0)) + 's');

let clips = [], i = 0, stopped = false;
// ponytail: cache next clip's resolved mp4 url so the GQL roundtrip happens during playback, not between clips
let nextResolved = null; // { id, url }
async function prefetchNext() {
  if (!clips.length) return;
  const ni = (i + 1) % clips.length;
  const id = clips[ni]?.id; if (!id) return;
  try { const url = await resolveMp4(id); nextResolved = { id, url }; }
  catch (e) { log('info', 'prefetch failed', id, e.message); nextResolved = null; }
}

function render(c) {
  info.textContent = '';
  if (TEMPLATE) {
    const t = document.createElement('div'); t.className = 'ti';
    t.textContent = expand(TEMPLATE, c);
    info.appendChild(t);
    return;
  }
  const ch = document.createElement('div'); ch.className = 'ch';
  ch.textContent = CH_TPL ? expand(CH_TPL, c) : (c.broadcaster_name || c._channel);
  const ti = document.createElement('div'); ti.className = 'ti';
  ti.textContent = TI_TPL ? expand(TI_TPL, c) : (c.title || '');
  const me = document.createElement('div'); me.className = 'me';
  me.textContent = ME_TPL ? expand(ME_TPL, c)
    : `${fmtN(c.view_count)} views · clipped by ${c.creator_name} · ${new Date(c.created_at).toLocaleDateString()}${c._game?' · '+c._game:''}`;
  info.append(ch, ti, me);
}

async function play() {
  if (!clips.length || stopped) return;
  if (LOOP && playedCount >= LOOP) { log('info', 'loop done'); return stopPlayer(); }
  const c = clips[i];
  log('info', `play [${i+1}/${clips.length}]`, c.id, '·', c._channel);
  bar.style.transition = 'none'; bar.style.width = '0';
  try {
    // ponytail: transition video and CSS transition are mutually exclusive — video wins when both set
    const useVideoTransition = TRANSITION_VID && playedCount > 0;
    if (useVideoTransition) await playTransitionVideo();
    const url = (nextResolved?.id === c.id) ? nextResolved.url : await resolveMp4(c.id);
    nextResolved = null;
    // Load into BACK; play; then crossfade swap with FRONT.
    back.classList.remove('clip-enter','clip-exit'); // ponytail: previous cycle's exit may still be live (forwards fill = opacity 0) if user skipped fast
    back.src = url;
    back.volume = VOLUME;
    back.muted = VOLUME === 0;
    await back.play().catch(err => { log('info', 'unmuted blocked, muting:', err.message); back.muted = true; return back.play(); });
    // ponytail: animation + overlay text fire AFTER play() resolves so they align with the actual frame swap, not the network fetch
    render(c);
    const useCss = !useVideoTransition && TRANSITION && TRANSITION_KF[TRANSITION] && playedCount > 0;
    if (useCss) {
      front.classList.remove('clip-enter'); void front.offsetWidth; front.classList.add('clip-exit');
      back.classList.add('clip-enter');
      info.classList.remove('clip-enter'); void info.offsetWidth; info.classList.add('clip-enter');
    }
    // Swap roles. New front on top so it's not occluded by the old element (DOM order alone is unreliable).
    [front, back] = [back, front]; const oldFront = back;
    front.style.zIndex = '2'; back.style.zIndex = '1';
    setTimeout(() => {
      if (oldFront === back) { oldFront.pause(); oldFront.removeAttribute('src'); oldFront.load(); oldFront.classList.remove('clip-enter','clip-exit'); }
    }, useCss ? TRANSITION_MS + 50 : 0);
    markSeen(c.id);
    playedCount++;
    prefetchNext();
  } catch (e) { log('err', 'skip', c.id, e.message); return skip(); }
  bar.style.transition = `width ${front.duration || c.duration || 30}s linear`;
  bar.style.width = '100%';
}

const skip = () => {
  if (!clips.length) return;
  i = (i+1) % clips.length;
  if (GAP > 0) { front.pause(); front.removeAttribute('src'); setTimeout(play, GAP); }
  else play();
};
// ponytail: bind to both videos; only the current FRONT may advance the player
[v, v2].forEach(el => {
  el.addEventListener('ended', () => { if (el === front) { log('info', 'ended'); skip(); } });
  el.addEventListener('error', () => { if (el === front) { log('err', 'video error code=' + (el.error?.code), 'msg=' + (el.error?.message || '?')); skip(); } });
});

async function start() {
  msg.classList.remove('show');
  stopped = false;
  log('info', 'start, channels=', CHANNELS.join(','));
  try {
    clips = await loadAll();
    log('ok', 'loaded', clips.length, 'clips');
    if (!clips.length) return showText('No clips found for: ' + CHANNELS.join(', '));
    i = 0; play();
  } catch (e) { log('err', 'start:', e.message); showText('Error: ' + e.message); }
}

function stopPlayer() {
  stopped = true;
  [v, v2].forEach(el => { el.pause(); el.removeAttribute('src'); el.load(); el.classList.remove('clip-enter','clip-exit'); });
  info.textContent = ''; bar.style.width = '0';
}

// ── Chat control (raw IRC over WSS — no library) ─────────────────────────
function connectChat() {
  if (!CHAT_CTRL && !COMMAND) return;
  const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws.onopen = () => {
    ws.send('CAP REQ :twitch.tv/tags');
    ws.send('PASS SCHMOOPIIE');
    ws.send('NICK justinfan' + (Math.random()*1e5|0));
    CHANNELS.forEach(c => ws.send('JOIN #' + c.toLowerCase()));
  };
  ws.onmessage = ev => {
    for (const line of ev.data.split('\r\n').filter(Boolean)) {
      if (line.startsWith('PING')) { ws.send('PONG' + line.slice(4)); continue; }
      const m = line.match(/^(@[^ ]+ )?:([^!]+)![^ ]+ PRIVMSG #([^ ]+) :(.+)$/);
      if (!m) continue;
      const tags = m[1] || '', user = m[2], channel = m[3], text = m[4].trim().toLowerCase();
      const isMod = /mod=1|badges=[^;]*broadcaster\/\d+/.test(tags) || user === channel;
      if (MODS_ONLY && !isMod) continue;
      if (CHAT_CTRL) {
        if (text === '!clipskip')   skip();
        if (text === '!clippause')  front.pause();
        if (text === '!clipplay')   front.play().catch(()=>{});
        if (text === '!clipreload') start();
      }
      if (COMMAND) {
        if (text === COMMAND)            start();
        if (text === COMMAND + ' stop')  stopPlayer();
      }
    }
  };
  ws.onclose = () => setTimeout(connectChat, 3000);
}

if (COMMAND) showText('Waiting for chat command: ' + COMMAND);
else         start();
connectChat();

if (get('showupdates') === 'true') {

      const b = document.createElement('a');
      b.href = r.html_url; b.target = '_blank';
      b.textContent = `Update available: ${r.tag_name} (running ${VERSION})`;
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:100;background:#9147ff;color:#fff;font:13px system-ui,sans-serif;padding:6px 12px;text-align:center;text-decoration:none';
      document.body.appendChild(b);
    }).catch(() => {});
}
